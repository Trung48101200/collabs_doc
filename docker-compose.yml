services:

  mysql:
    image: mysql:8.4
    container_name: mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: collab_docs
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword

    ports:
      - "3309:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - app-network


  backend:
    build:
      context: ./backend

    container_name: backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - /app/node_modules

    depends_on:
      - mysql

    networks:
      - app-network


  frontend:
    build:
      context: ./frontend

    container_name: frontend

    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    networks:
      - app-network


volumes:
   mysql_data:


networks:
   app-network:
