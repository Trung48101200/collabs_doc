services:

  mysql:
    image: mysql:8.4
    container_name: mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: collab_docs
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword

    ports:
      - "3309:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-uroot","-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - app-network


  backend:
    build:
      context: ./backend

    container_name: backend

    restart: unless-stopped

    ports:
      - "4000:4000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - /app/node_modules

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - app-network


  frontend:
    build:
      context: ./frontend

    container_name: frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    networks:
      - app-network


volumes:
   mysql_data:


networks:
   app-network:
