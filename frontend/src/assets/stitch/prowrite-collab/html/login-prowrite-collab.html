<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ProWrite Collab</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#ffffff",
                    "secondary-fixed-dim": "#c5c7c8",
                    "secondary-container": "#e1e3e4",
                    "background": "#f9f9ff",
                    "on-secondary-fixed-variant": "#454748",
                    "tertiary-fixed": "#d9e3f4",
                    "primary-container": "#2563eb",
                    "outline": "#737686",
                    "tertiary-container": "#646e7d",
                    "on-tertiary-container": "#e9f1ff",
                    "tertiary-fixed-dim": "#bdc7d8",
                    "on-tertiary-fixed-variant": "#3e4755",
                    "surface-dim": "#d3daef",
                    "on-primary-container": "#eeefff",
                    "surface-variant": "#dce2f7",
                    "primary-fixed-dim": "#b4c5ff",
                    "primary-fixed": "#dbe1ff",
                    "secondary-fixed": "#e1e3e4",
                    "surface-container-low": "#f1f3ff",
                    "surface-container-high": "#e1e8fd",
                    "secondary": "#5c5f60",
                    "surface-container": "#e9edff",
                    "outline-variant": "#c3c6d7",
                    "on-surface": "#141b2b",
                    "surface": "#f9f9ff",
                    "surface-tint": "#0053db",
                    "on-background": "#141b2b",
                    "on-error-container": "#93000a",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#293040",
                    "surface-container-lowest": "#ffffff",
                    "on-primary": "#ffffff",
                    "surface-bright": "#f9f9ff",
                    "inverse-on-surface": "#edf0ff",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed": "#191c1d",
                    "primary": "#004ac6",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#dce2f7",
                    "on-secondary-container": "#626566",
                    "inverse-primary": "#b4c5ff",
                    "tertiary": "#4c5664",
                    "on-primary-fixed": "#00174b",
                    "on-surface-variant": "#434655",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed": "#121c28",
                    "on-primary-fixed-variant": "#003ea8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-desktop": "40px",
                    "sm": "16px",
                    "editor-max-width": "800px",
                    "xl": "48px",
                    "xs": "8px",
                    "lg": "32px",
                    "gutter": "24px",
                    "base": "4px",
                    "margin-mobile": "16px",
                    "md": "24px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "label-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Inter"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "30px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar or focus effects if needed */
        .focus-ring {
            transition: box-shadow 0.2s ease-in-out, border-color 0.2s ease-in-out;
        }
        .focus-ring:focus {
            outline: none;
            border-color: #004ac6;
            box-shadow: 0 0 0 3px rgba(0, 74, 198, 0.1);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col justify-center items-center px-margin-mobile md:px-margin-desktop">
<!-- The Login Form Shell -->
<main class="w-full max-w-[440px] flex flex-col gap-lg">
<!-- Brand Identity Header -->
<header class="flex flex-col items-center gap-xs">
<!-- Utilizing Logo Styles from JSON context (ProWrite Collab) -->
<h1 class="text-headline-md font-headline-md font-bold text-primary">
                ProWrite Collab
            </h1>
<p class="text-body-md font-body-md text-secondary text-center">
                Sign in to your collaborative workspace
            </p>
</header>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-md md:p-lg shadow-sm">
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col gap-base">
<label class="text-label-sm font-label-sm text-on-surface-variant" for="email">
                        Email Address
                    </label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline" data-icon="mail">mail</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus-ring" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="text-label-sm font-label-sm text-on-surface-variant" for="password">
                            Password
                        </label>
<a class="text-label-sm font-label-sm text-primary hover:underline transition-opacity duration-150" href="#">
                            Forgot password?
                        </a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline" data-icon="lock">lock</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface focus-ring" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="mt-xs w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-xs" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
<!-- Alternative Sign In Options -->
<div class="relative flex items-center py-xs">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-sm text-label-sm font-label-sm text-outline">or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-1 gap-sm">
<button class="w-full h-12 bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md rounded-lg flex items-center justify-center gap-xs hover:bg-surface-container-low transition-colors active:scale-[0.98]" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="google">google</span>
                        Google Workspace
                    </button>
</div>
</form>
</div>
<!-- Footer Link (JSON Suppression Rule: Login page suppresses Main Shell Footer) -->
<footer class="flex justify-center items-center py-xs">
<p class="text-body-sm font-body-sm text-secondary">
                Don’t have an account? 
                <a class="text-primary font-bold hover:underline transition-all" href="#">Create an account</a>
</p>
</footer>
</main>
<!-- Background Subtle Atmospheric Element (Optional CSS Art) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-40">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed-dim blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] rounded-full bg-surface-dim blur-[100px]"></div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
</body></html>
